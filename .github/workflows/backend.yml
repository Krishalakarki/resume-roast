name: Backend CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  test:

    runs-on: ubuntu-latest


    services:

      mysql:

        image: mysql:8

        env:

          MYSQL_ROOT_PASSWORD: root

          MYSQL_DATABASE: test_db


        ports:

          - 3306:3306


        options: >-

          --health-cmd="mysqladmin ping"

          --health-interval 10s

          --health-timeout 5s

          --health-retries 5



    steps:


    - name: Checkout code

      uses: actions/checkout@v4



    - name: Setup Python

      uses: actions/setup-python@v5

      with:

        python-version: "3.10"



    - name: Install dependencies

      run: |

        cd backend

        pip install -r requirements.txt



    - name: Run tests

      env:

        DATABASE_URL: mysql+pymysql://root:root@127.0.0.1:3306/test_db


      run: |

        cd backend

        PYTHONPATH=. pytest