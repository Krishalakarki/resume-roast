<!DOCTYPE html>
<html>

<head>
    <title>Signup · Resume Roaster</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>


<body class="auth-body">

<div class="auth-card">

    <h2>Create your account</h2>
    <p class="auth-hint">It takes 30 seconds. The roast takes longer to recover from.</p>

    <input
        id="signupEmail"
        placeholder="Email">

    <input
        id="signupPassword"
        type="password"
        placeholder="Password">

    <button class="primary-btn" onclick="signup()">
        Sign up
    </button>

    <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>

</div>

<script src="app.js"></script>

</body>

</html>
